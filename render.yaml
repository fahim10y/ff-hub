services:
  - type: web
    name: ff-hub-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ff-hub-db
          property: connectionString

databases:
  - name: ff-hub-db
    databaseName: ffhub
    user: ffhub_admin
